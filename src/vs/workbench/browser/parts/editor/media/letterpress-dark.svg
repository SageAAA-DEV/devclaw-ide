<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" opacity="0.25">
  <!-- DevClaw Lobster Watermark (dark theme) -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
  </defs>

  <!-- Antennae -->
  <path d="M100 65 Q90 30 75 15" stroke="#cc3333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M160 65 Q170 30 185 15" stroke="#cc3333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="75" cy="13" r="4" fill="#cc3333"/>
  <circle cx="185" cy="13" r="4" fill="#cc3333"/>

  <!-- Left claw -->
  <path d="M60 95 Q20 80 15 60 Q10 45 30 42 Q45 40 50 55 Q52 65 55 75 Z" fill="url(#bodyGrad)"/>
  <path d="M15 60 Q5 50 18 38 Q28 30 30 42" fill="url(#bodyGrad)"/>

  <!-- Right claw (raised, waving) -->
  <path d="M200 95 Q240 70 248 50 Q252 35 232 32 Q218 30 212 48 Q208 58 205 72 Z" fill="url(#bodyGrad)"/>
  <path d="M248 50 Q258 38 244 28 Q234 22 232 32" fill="url(#bodyGrad)"/>

  <!-- Body -->
  <ellipse cx="130" cy="120" rx="62" ry="55" fill="url(#bodyGrad)"/>

  <!-- Tail segments -->
  <ellipse cx="130" cy="175" rx="48" ry="14" fill="#cc2222"/>
  <ellipse cx="130" cy="192" rx="40" ry="12" fill="#bb1a1a"/>
  <ellipse cx="130" cy="207" rx="32" ry="10" fill="#aa1515"/>

  <!-- Tail fan -->
  <ellipse cx="130" cy="222" rx="38" ry="10" fill="#cc2222"/>
  <ellipse cx="108" cy="225" rx="16" ry="8" fill="#bb1a1a" transform="rotate(-15 108 225)"/>
  <ellipse cx="152" cy="225" rx="16" ry="8" fill="#bb1a1a" transform="rotate(15 152 225)"/>

  <!-- Eyes -->
  <circle cx="110" cy="100" r="12" fill="#1a1a2e"/>
  <circle cx="150" cy="100" r="12" fill="#1a1a2e"/>
  <circle cx="108" cy="97" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="148" cy="97" r="4" fill="#ffffff" opacity="0.7"/>

  <!-- Smirk / confident grin -->
  <path d="M115 118 Q130 130 145 118" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="85" y1="140" x2="60" y2="160" stroke="#cc3333" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="150" x2="55" y2="172" stroke="#cc3333" stroke-width="4" stroke-linecap="round"/>
  <line x1="175" y1="140" x2="200" y2="160" stroke="#cc3333" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="150" x2="205" y2="172" stroke="#cc3333" stroke-width="4" stroke-linecap="round"/>

  <!-- "DevClaw" text -->
  <text x="130" y="252" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">
    <tspan fill="#e84040">Dev</tspan><tspan fill="#888888">Claw</tspan>
  </text>
</svg>
