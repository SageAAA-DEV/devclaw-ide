<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Neon claw icon -->
  <g filter="url(#glow)">
    <!-- Outer claw (left pincer) -->
    <path d="M90 55 Q50 70 40 120 Q35 155 55 180 Q70 195 85 185 Q75 160 80 130 Q85 105 100 90 Z"
          fill="none" stroke="#ff3333" stroke-width="4" stroke-linecap="round"/>
    <!-- Inner claw (right pincer) -->
    <path d="M140 55 Q170 65 185 95 Q195 120 180 145 Q170 160 155 150 Q165 130 160 110 Q155 85 140 75 Z"
          fill="none" stroke="#ff3333" stroke-width="4" stroke-linecap="round"/>
    <!-- Claw joint / serrated edge -->
    <path d="M100 90 Q110 70 120 65 Q130 62 140 75"
          fill="none" stroke="#ff3333" stroke-width="3" stroke-linecap="round"/>
    <path d="M108 80 L115 68 L122 78"
          fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M125 75 L132 65 L138 78"
          fill="none" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base / stem -->
    <path d="M85 185 Q95 210 110 220 Q120 225 128 220 Q140 210 145 195"
          fill="none" stroke="#ff3333" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
